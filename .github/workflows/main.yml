name: Update README Metrics and Generate Animations

on:
  workflow_dispatch: # allows to manually run the job at any time

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-wakatime-metrics:
    permissions: 
      contents: write
    name: Update README WakaTime Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master # this action name
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SHOW_TITLE: true # optional
          ### content
          SECTION_NAME: waka # optional
          BLOCKS: -> # optional
          TIME_RANGE: all_time # optional
          LANG_COUNT: 10 # optional
          SHOW_TIME: true # optional
          SHOW_TOTAL: true # optional
  generate-3d-contribution-graphs:
    needs: update-wakatime-metrics
    runs-on: ubuntu-latest
    name: Generate 3D Contribution Graphs
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          if git commit -m "generated"; then
            git pull --rebase origin main
            git push origin HEAD:main
          fi
  generate-snake-animation:
    needs: generate-space-shooter-gif
    permissions: 
      contents: write
    name: Generate Snake Contribution Animation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: generate github-contribution-grid-snake.svg # generates a snake game from a github user (<github_user_name>) contributions graph, output a svg animation at <svg_out_path>
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            github-contribution-grid-snake.svg
            github-contribution-grid-snake-dark.svg?palette=github-dark
      - name: Commit & Push snake SVGs to main
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add github-contribution-grid-snake.svg github-contribution-grid-snake-dark.svg
          if git commit -m "Update snake contribution animation"; then
            git pull --rebase origin main
            git push origin HEAD:main
          fi
  generate-space-shooter-gif:
    needs: generate-3d-contribution-graphs
    name: Generate Space Shooter GIF
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - uses: czl9707/gh-space-shooter@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-path: 'game.gif'
          strategy: 'random'
